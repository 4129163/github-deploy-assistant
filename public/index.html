<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">GitHub Deploy Assistant - 可视化部署管理器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <style>
        /* 语言选择器样式 */
        .language-selector {
            margin-right: 10px;
        }
        
        .language-dropdown {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .language-dropdown:hover {
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.1);
        }
        
        .language-dropdown:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }
        
        .language-dropdown option {
            padding: 8px;
        }
        
        /* 国际化样式 */
        [dir="rtl"] .app-header,
        [dir="rtl"] .sidebar,
        [dir="rtl"] .main-content {
            direction: rtl;
        }
        
        [lang="ar"] .app-header,
        [lang="he"] .app-header {
            font-family: 'Arial', sans-serif;
        }
        
        /* 响应式调整 */
        @media (max-width: 768px) {
            .language-selector {
                margin-right: 5px;
            }
            
            .language-dropdown {
                padding: 4px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-rocket"></i>
                    <h1 data-i18n="app.title">GitHub Deploy Assistant</h1>
                </div>
                <span class="version" data-i18n="app.version">v2.0.0</span>
            </div>
            <div class="header-right">
                <div class="system-status">
                    <div class="status-item">
                        <i class="fas fa-server"></i>
                        <span class="status-text" id="system-status" data-i18n="status.running">运行正常</span>
                    </div>
                    <div class="status-item">
                        <i class="fas fa-project-diagram"></i>
                        <span class="status-text" id="project-count">0 <span data-i18n="project.list">个项目</span></span>
                    </div>
                </div>
                <button class="btn btn-primary btn-icon" id="settings-btn" data-i18n-title="app.settings" title="设置">
                    <i class="fas fa-cog"></i>
                </button>
                <button class="btn btn-dark btn-icon" id="refresh-btn" data-i18n-title="tooltip.refresh" title="刷新">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧项目列表 -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3><i class="fas fa-list"></i> <span data-i18n="project.list">项目列表</span></h3>
                    <button class="btn btn-success btn-sm" id="add-project-btn" data-i18n="project.add">
                        <i class="fas fa-plus"></i> <span data-i18n="project.add">添加项目</span>
                    </button>
                </div>
                
                <div class="project-list-container" id="project-list-container">
                    <!-- 项目列表将通过JS动态生成 -->
                    <div class="empty-state" id="empty-state">
                        <p data-i18n="project.no_projects">暂无项目</p>
                        <button class="btn btn-outline btn-sm" id="quick-add-btn" data-i18n="project.quick_add">
                            <i class="fas fa-plus-circle"></i> <span data-i18n="project.quick_add">快速添加</span>
                        </button>
                    </div>
                </div>
                
                <!-- 模板市场入口 -->
                <div class="market-entry" id="market-entry">
                    <div class="market-icon">
                        <i class="fas fa-store"></i>
                    </div>
                    <div class="market-info">
                        <div style="font-weight: 600; font-size: 1.1rem;" data-i18n="template.market">模板市场</div>
                        <div style="font-size: 0.85rem; opacity: 0.9; margin-top: 5px;" data-i18n="template.market.description">发现热门项目，一键部署</div>
                    </div>
                </div>
                
                <!-- 系统信息 -->
                <div class="system-info">
                    <h4 data-i18n="system.status">系统状态</h4>
                    <div class="info-grid">
                        <div class="info-item">
                            <i class="fas fa-microchip"></i>
                            <span data-i18n="system.cpu">CPU</span>: <span id="cpu-usage">0%</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-memory"></i>
                            <span data-i18n="system.memory">内存</span>: <span id="memory-usage">0%</span>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-hdd"></i>
                            <span data-i18n="system.disk">磁盘</span>: <span id="disk-usage">0%</span>
                        </div>
                    </div>
                    <button class="btn btn-outline btn-block btn-sm" id="monitor-btn" data-i18n="monitoring.detailed">
                        <i class="fas fa-chart-line"></i> <span data-i18n="monitoring.detailed">查看详细监控</span>
                    </button>
                </div>
            </aside>

            <!-- 主面板 -->
            <main class="main-panel">
                <div class="panel-header">
                    <h2 id="selected-project-title" data-i18n="project.details">项目详情</h2>
                    <div class="status-badge" id="project-status-display">
                        <span class="status-dot"></span>
                        <span data-i18n="status.unknown">未知状态</span>
                    </div>
                </div>
                
                <!-- 项目信息卡片 -->
                <div class="project-card" id="project-card" style="display: none;">
                    <div class="card-header">
                        <h3 id="project-name">项目名称</h3>
                        <div class="card-actions">
                            <button class="btn btn-success btn-sm" id="start-btn" data-i18n="action.start">
                                <i class="fas fa-play"></i> <span data-i18n="action.start">启动</span>
                            </button>
                            <button class="btn btn-danger btn-sm" id="stop-btn" data-i18n="action.stop">
                                <i class="fas fa-stop"></i> <span data-i18n="action.stop">停止</span>
                            </button>
                            <button class="btn btn-warning btn-sm" id="restart-btn" data-i18n="action.restart">
                                <i class="fas fa-redo"></i> <span data-i18n="action.restart">重启</span>
                            </button>
                            <button class="btn btn-info btn-sm" id="logs-btn" data-i18n="action.logs">
                                <i class="fas fa-file-alt"></i> <span data-i18n="action.logs">查看日志</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="card-body">
                        <div class="info-grid">
                            <div class="info-item">
                                <label data-i18n="project.type">项目类型</label>
                                <span id="project-type">-</span>
                            </div>
                            <div class="info-item">
                                <label data-i18n="project.port">端口</label>
                                <span id="project-port">-</span>
                                <button class="btn btn-outline btn-xs" id="edit-port-btn" data-i18n="action.edit_port">
                                    <i class="fas fa-edit"></i> <span data-i18n="action.edit_port">编辑</span>
                                </button>
                            </div>
                            <div class="info-item">
                                <label data-i18n="project.path">路径</label>
                                <span id="project-path">-</span>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn btn-outline btn-sm" id="edit-env-btn" data-i18n="action.edit_env">
                                <i class="fas fa-cog"></i> <span data-i18n="action.edit_env">编辑环境变量</span>
                            </button>
                            <button class="btn btn-outline btn-sm" id="update-deps-btn" data-i18n="action.update_deps">
                                <i class="fas fa-sync"></i> <span data-i18n="action.update_deps">更新依赖</span>
                            </button>
                            <button class="btn btn-outline btn-sm" id="rebuild-btn" data-i18n="action.rebuild">
                                <i class="fas fa-hammer"></i> <span data-i18n="action.rebuild">重新构建</span>
                            </button>
                            <button class="btn btn-outline btn-sm" id="backup-btn" data-i18n="action.backup">
                                <i class="fas fa-save"></i> <span data-i18n="action.backup">备份</span>
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 部署向导 -->
                <div class="deployment-wizard" id="deployment-wizard" style="display: none;">
                    <h3 data-i18n="wizard.title">部署向导</h3>
                    <div class="wizard-steps">
                        <div class="wizard-step active">
                            <div class="step-number">1</div>
                            <div class="step-label" data-i18n="wizard.step1">选择项目</div>
                        </div>
                        <div class="wizard-step">
                            <div class="step-number">2</div>
                            <div class="step-label" data-i18n="wizard.step2">配置</div>
                        </div>
                        <div class="wizard-step">
                            <div class="step-number">3</div>
                            <div class="step-label" data-i18n="wizard.step3">依赖</div>
                        </div>
                        <div class="wizard-step">
                            <div class="step-number">4</div>
                            <div class="step-label" data-i18n="wizard.step4">环境变量</div>
                        </div>
                        <div class="wizard-step">
                            <div class="step-number">5</div>
                            <div class="step-label" data-i18n="wizard.step5">部署</div>
                        </div>
                        <div class="wizard-step">
                            <div class="step-number">6</div>
                            <div class="step-label" data-i18n="wizard.step6">验证</div>
                        </div>
                    </div>
                    
                    <div class="wizard-content">
                        <!-- 向导内容将通过JS动态生成 -->
                    </div>
                    
                    <div class="wizard-actions">
                        <button class="btn btn-secondary" id="wizard-prev" data-i18n="wizard.previous">上一步</button>
                        <button class="btn btn-primary" id="wizard-next" data-i18n="wizard.next">下一步</button>
                        <button class="btn btn-outline" id="wizard-cancel" data-i18n="wizard.cancel">取消</button>
                    </div>
                </div>
                
                <!-- 空状态 -->
                <div class="empty-main-state" id="empty-main-state">
                    <div class="empty-icon">
                        <i class="fas fa-rocket"></i>
                    </div>
                    <h3 data-i18n="project.no_projects">暂无项目</h3>
                    <p data-i18n="app.info">请添加一个项目开始部署</p>
                    <button class="btn btn-primary btn-lg" id="main-add-btn" data-i18n="project.add">
                        <i class="fas fa-plus"></i> <span data-i18n="project.add">添加项目</span>
                    </button>
                </div>
            </main>
        </div>

        <!-- 页脚 -->
        <footer class="app-footer">
            <div class="footer-left">
                <span data-i18n="app.title">GitHub Deploy Assistant</span> • 
                <span data-i18n="app.version">v2.0.0</span>
            </div>
            <div class="footer-right">
                <a href="#" data-i18n="app.help">帮助</a> • 
                <a href="#" data-i18n="app.about">关于</a> • 
                <span data-i18n="app.language">语言</span>: 
                <select id="footer-language" class="language-dropdown">
                    <option value="en" data-icon="🇺🇸">English</option>
                    <option value="zh-CN" data-icon="🇨🇳">中文</option>
                    <option value="ja" data-icon="🇯🇵">日本語</option>
                </select>
            </div>
        </footer>
    </div>

    <!-- JavaScript文件 -->
    <script src="js/i18n/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/api.js"></script>
    
    <script>
        // 初始化i18n
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化国际化
            I18n.init();
            
            // 设置页脚语言选择器
            const footerLangSelect = document.getElementById('footer-language');
            if (footerLangSelect) {
                footerLangSelect.value = I18n.getCurrentLanguage();
                footerLangSelect.addEventListener('change', function(e) {
                    I18n.setLanguage(e.target.value);
                });
            }
            
            // 监听语言变化事件
            document.addEventListener('languageChanged', function(e) {
                console.log('Language changed to:', e.detail.language);
                // 更新页脚语言选择器
                if (footerLangSelect) {
                    footerLangSelect.value = e.detail.language;
                }
            });
            
            // 初始化主应用
            if (typeof initApp === 'function') {
                initApp();
            }
        });
    </script>
</body>
</html>
