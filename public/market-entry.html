<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板市场入口 - GitHub Deploy Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .market-entry-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .market-entry-card {
            background: white;
            border-radius: 20px;
            padding: 50px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        .market-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .market-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px;
        }
        
        .market-subtitle {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .market-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .feature {
            text-align: left;
            padding: 20px;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        
        .feature-icon {
            font-size: 1.5rem;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .feature-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }
        
        .feature-desc {
            font-size: 0.95rem;
            color: #6b7280;
            line-height: 1.5;
        }
        
        .market-actions {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .btn-market {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-market-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-market-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-market-secondary {
            background: #f3f4f6;
            color: #4b5563;
        }
        
        .btn-market-secondary:hover {
            background: #e5e7eb;
        }
        
        .back-link {
            margin-top: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        
        .back-link:hover {
            opacity: 0.9;
        }
        
        @media (max-width: 768px) {
            .market-features {
                grid-template-columns: 1fr;
            }
            
            .market-entry-card {
                padding: 30px;
            }
            
            .market-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="market-entry-container">
        <div class="market-entry-card">
            <div class="market-icon">
                <i class="fas fa-store"></i>
            </div>
            
            <h1 class="market-title">模板市场</h1>
            <p class="market-subtitle">
                发现并一键部署热门开源项目。我们精心挑选了 5-10 个经典项目模板，
                包含预配置环境变量、端口建议和启动命令，让部署变得简单快捷。
            </p>
            
            <div class="market-features">
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-rocket"></i>
                    </div>
                    <h3 class="feature-title">一键部署</h3>
                    <p class="feature-desc">点击图标即可快速部署，无需复杂配置</p>
                </div>
                
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-cogs"></i>
                    </div>
                    <h3 class="feature-title">预配置环境</h3>
                    <p class="feature-desc">包含环境变量、端口设置和启动命令</p>
                </div>
                
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-star"></i>
                    </div>
                    <h3 class="feature-title">热门项目</h3>
                    <p class="feature-desc">精选 GitHub 星标数最高的开源项目</p>
                </div>
                
                <div class="feature">
                    <div class="feature-icon">
                        <i class="fas fa-search"></i>
                    </div>
                    <h3 class="feature-title">智能搜索</h3>
                    <p class="feature-desc">按名称、分类、标签快速查找模板</p>
                </div>
            </div>
            
            <div class="market-actions">
                <button class="btn-market btn-market-primary" onclick="enterTemplateMarket()">
                    <i class="fas fa-arrow-right"></i>
                    进入模板市场
                </button>
                
                <button class="btn-market btn-market-secondary" onclick="goBackHome()">
                    <i class="fas fa-home"></i>
                    返回首页
                </button>
            </div>
        </div>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            返回 GitHub Deploy Assistant 主界面
        </a>
    </div>
    
    <script>
        function enterTemplateMarket() {
            window.location.href = 'template-market.html';
        }
        
        function goBackHome() {
            window.location.href = 'index.html';
        }
        
        // 3秒后自动跳转到模板市场（可选）
        setTimeout(() => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('auto')) {
                enterTemplateMarket();
            }
        }, 3000);
    </script>
</body>
</html>
