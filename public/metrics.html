<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源监控仪表盘 - GitHub Deploy Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 监控仪表盘专属样式 */
        .metrics-dashboard {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .dashboard-header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .dashboard-header h1 i {
            margin-right: 10px;
            color: #4CAF50;
        }
        
        .dashboard-controls {
            display: flex;
            gap: 10px;
        }
        
        .refresh-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: var(--primary-dark);
        }
        
        .refresh-btn.refreshing i {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .time-range-selector {
            display: flex;
            gap: 5px;
            background: var(--bg-secondary);
            border-radius: 4px;
            padding: 4px;
        }
        
        .time-range-btn {
            background: transparent;
            border: none;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        
        .time-range-btn.active {
            background: var(--primary-color);
            color: white;
        }
        
        .time-range-btn:hover:not(.active) {
            background: var(--bg-hover);
        }
        
        /* 概览卡片 */
        .overview-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .overview-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .card-trend {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .card-trend.positive {
            color: #4CAF50;
        }
        
        .card-trend.negative {
            color: #f44336;
        }
        
        .card-progress {
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .card-progress-bar {
            height: 100%;
            background: var(--primary-color);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .cpu-progress { background: linear-gradient(90deg, #4CAF50, #8BC34A); }
        .memory-progress { background: linear-gradient(90deg, #2196F3, #03A9F4); }
        .disk-progress { background: linear-gradient(90deg, #FF9800, #FFC107); }
        .network-progress { background: linear-gradient(90deg, #9C27B0, #E91E63); }
        
        /* 图表区域 */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chart {
            height: 300px;
            width: 100%;
        }
        
        /* 进程和端口区域 */
        .detailed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }
        
        .process-container, .ports-container {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
        }
        
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px 15px;
            background: var(--bg-secondary);
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 14px;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }
        
        tr:hover {
            background: var(--bg-hover);
        }
        
        .process-pid {
            font-family: monospace;
            font-weight: 500;
        }
        
        .process-user {
            color: var(--text-secondary);
        }
        
        .process-resource {
            font-weight: 500;
        }
        
        .process-cpu.high { color: #f44336; }
        .process-cpu.medium { color: #FF9800; }
        .process-cpu.low { color: #4CAF50; }
        
        .process-mem.high { color: #f44336; }
        .process-mem.medium { color: #FF9800; }
        .process-mem.low { color: #4CAF50; }
        
        .port-number {
            font-family: monospace;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .port-protocol {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
        }
        
        .port-state {
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .port-state.listening {
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }
        
        .port-state.established {
            background: rgba(33, 150, 243, 0.1);
            color: #2196F3;
        }
        
        .port-state.other {
            background: rgba(158, 158, 158, 0.1);
            color: #9E9E9E;
        }
        
        .port-description {
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        /* 响应式设计 */
        @media (max-width: 1200px) {
            .charts-grid,
            .detailed-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .dashboard-controls {
                width: 100%;
                flex-wrap: wrap;
            }
            
            .overview-cards {
                grid-template-columns: 1fr;
            }
            
            .chart-container,
            .process-container,
            .ports-container {
                padding: 15px;
            }
            
            .chart {
                height: 250px;
            }
        }
        
        /* 加载状态 */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--border-color);
        }
        
        .empty-state p {
            margin: 0;
            font-size: 16px;
        }
        
        /* 顶部导航 */
        .top-nav {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }
        
        .back-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="top-nav">
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i> 返回主界面
        </button>
        <div class="nav-title">
            <i class="fas fa-chart-line"></i> 资源监控仪表盘
        </div>
    </div>
    
    <div class="metrics-dashboard">
        <!-- 仪表盘头部 -->
        <div class="dashboard-header">
            <h1><i class="fas fa-tachometer-alt"></i> 系统资源监控</h1>
            <div class="dashboard-controls">
                <div class="time-range-selector">
                    <button class="time-range-btn active" data-range="5m">5分钟</button>
                    <button class="time-range-btn" data-range="15m">15分钟</button>
                    <button class="time-range-btn" data-range="1h">1小时</button>
                    <button class="time-range-btn" data-range="6h">6小时</button>
                </div>
                <button class="refresh-btn" id="refreshBtn">
                    <i class="fas fa-sync-alt"></i> 刷新
                </button>
            </div>
        </div>
        
        <!-- 概览卡片 -->
        <div class="overview-cards">
            <div class="overview-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-microchip"></i>
                        CPU使用率
                    </div>
                    <div class="card-extra">
                        <i class="fas fa-server"></i>
                        <span id="cpuCores">0 核心</span>
                    </div>
                </div>
                <div class="card-value" id="cpuUsage">0%</div>
                <div class="card-trend" id="cpuTrend">--</div>
                <div class="card-progress">
                    <div class="card-progress-bar cpu-progress" id="cpuProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="overview-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-memory"></i>
                        内存使用率
                    </div>
                    <div class="card-extra">
                        <i class="fas fa-database"></i>
                        <span id="memoryTotal">0 GB</span>
                    </div>
                </div>
                <div class="card-value" id="memoryUsage">0%</div>
                <div class="card-trend" id="memoryTrend">--</div>
                <div class="card-progress">
                    <div class="card-progress-bar memory-progress" id="memoryProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="overview-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-hdd"></i>
                        磁盘使用率
                    </div>
                    <div class="card-extra">
                        <i class="fas fa-folder"></i>
                        <span id="diskMount">/</span>
                    </div>
                </div>
                <div class="card-value" id="diskUsage">0%</div>
                <div class="card-trend" id="diskTrend">--</div>
                <div class="card-progress">
                    <div class="card-progress-bar disk-progress" id="diskProgress" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="overview-card">
                <div class="card-header">
                    <div class="card-title">
                        <i class="fas fa-network-wired"></i>
                        系统负载
                    </div>
                    <div class="card-extra">
                        <i class="fas fa-chart-bar"></i>
                        <span id="loadAvg">0.00</span>
                    </div>
                </div>
                <div class="card-value" id="processCount">0</div>
                <div class="card-trend">个进程运行中</div>
                <div class="card-progress">
                    <div class="card-progress-bar network-progress" id="loadProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="charts-grid">
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i> CPU使用率历史曲线
                </div>
                <div class="chart" id="cpuChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-area"></i> 内存使用率历史曲线
                </div>
                <div class="chart" id="memoryChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-chart-pie"></i> 磁盘使用分布
                </div>
                <div class="chart" id="diskChart"></div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">
                    <i class="fas fa-project-diagram"></i> 系统负载历史曲线
                </div>
                <div class="chart" id="loadChart"></div>
            </div>
        </div>
        
        <!-- 进程和端口区域 -->
        <div class="detailed-grid">
            <div class="process-container">
                <div class="chart-title">
                    <i class="fas fa-sitemap"></i> 进程树 (Top 20)
                </div>
                <div class="table-container">
                    <table id="processTable">
                        <thead>
                            <tr>
                                <th>PID</th>
                                <th>用户</th>
                                <th>命令</th>
                                <th>CPU</th>
                                <th>内存</th>
                            </tr>
                        </thead>
                        <tbody id="processTableBody">
                            <tr>
                                <td colspan="5" class="empty-state">
                                    <i class="fas fa-spinner fa-spin"></i>
                                    <p>加载进程信息中...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            <div class="ports-container">
                <div class="chart-title">
                    <i class="fas fa-plug"></i> 端口占用情况
                </div>
                <div class="table-container">
                    <table id="portsTable">
                        <thead>
                            <tr>
                                <th>端口</th>
                                <th>协议</th>
                                <th>状态</th>
                                <th>程序</th>
                                <th>描述</th>
                            </tr>
                        </thead>
                        <tbody id="portsTableBody">
                            <tr>
                                <td colspan="5" class="empty-state">
                                    <i class="fas fa-spinner fa-spin"></i>
                                    <p>加载端口信息中...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 引入ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        // 全局变量
        let currentTimeRange = '5m';
        let cpuChart, memoryChart, diskChart, loadChart;
        let refreshInterval;
        let lastMetrics = null;
        
        // 初始化ECharts图表
        function initCharts() {
            cpuChart = echarts.init(document.getElementById('cpuChart'));
            memoryChart = echarts.init(document.getElementById('memoryChart'));
            diskChart = echarts.init(document.getElementById('diskChart'));
            loadChart = echarts.init(document.getElementById('loadChart'));
            
            // 设置默认图表选项
            const defaultChartOption = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0, 0, 0, 0.7)',
                    borderColor: '#333',
                    textStyle: {
                        color: '#fff'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'time',
                    boundaryGap: false,
                    axisLine: {
                        lineStyle: {
                            color: '#666'
                        }
                    },
                    axisLabel: {
                        color: '#666',
                        formatter: function(value) {
                            const date = new Date(value);
                            return date.getHours().toString().padStart(2, '0') + ':' + 
                                   date.getMinutes().toString().padStart(2, '0');
                        }
                    }
                },
                yAxis: {
                    type: 'value',
                    boundaryGap: [0, '100%'],
                    axisLine: {
                        lineStyle: {
                            color: '#666'
                        }
                    },
                    axisLabel: {
                        color: '#666',
                        formatter: '{value}%'
                    }
                }
            };
            
            // CPU图表配置
            cpuChart.setOption({
                ...defaultChartOption,
                title: {
                    text: '',
                    left: 'center',
                    textStyle: {
                        color: '#666',
                        fontSize: 14
                    }
                },
                series: [{
                    name: 'CPU使用率',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(76, 175, 80, 0.3)' },
                            { offset: 1, color: 'rgba(76, 175, 80, 0.1)' }
                        ])
                    },
                    lineStyle: {
                        color: '#4CAF50',
                        width: 2
                    },
                    data: []
                }]
            });
            
            // 内存图表配置
            memoryChart.setOption({
                ...defaultChartOption,
                series: [{
                    name: '内存使用率',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(33, 150, 243, 0.3)' },
                            { offset: 1, color: 'rgba(33, 150, 243, 0.1)' }
                        ])
                    },
                    lineStyle: {
                        color: '#2196F3',
                        width: 2
                    },
                    data: []
                }]
            });
            
            // 磁盘图表配置
            diskChart.setOption({
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    formatter: '{a} <br/>{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'center',
                    textStyle: {
                        color: '#666'
                    }
                },
                series: [{
                    name: '磁盘使用',
                    type: 'pie',
                    radius: ['50%', '70%'],
                    avoidLabelOverlap: false,
                    itemStyle: {
                        borderRadius: 10,
                        borderColor: '#fff',
                        borderWidth: 2
                    },
                    label: {
                        show: false,
                        position: 'center'
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: '16',
                            fontWeight: 'bold'
                        }
                    },
                    labelLine: {
                        show: false
                    },
                    data: []
                }]
            });
            
            // 负载图表配置
            loadChart.setOption({
                ...defaultChartOption,
                yAxis: {
                    ...defaultChartOption.yAxis,
                    axisLabel: {
                        color: '#666'
                    }
                },
                series: [{
                    name: '1分钟负载',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    lineStyle: {
                        color: '#FF9800',
                        width: 2
                    },
                    data: []
                }, {
                    name: '5分钟负载',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    lineStyle: {
                        color: '#2196F3',
                        width: 2
                    },
                    data: []
                }, {
                    name: '15分钟负载',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    lineStyle: {
                        color: '#9C27B0',
                        width: 2
                    },
                    data: []
                }]
            });
            
            // 监听窗口大小变化，重新调整图表大小
            window.addEventListener('resize', function() {
                cpuChart.resize();
                memoryChart.resize();
                diskChart.resize();
                loadChart.resize();
            });
        }
        
        // 更新概览卡片
        function updateOverviewCards(metrics) {
            if (!metrics) return;
            
            // CPU卡片
            const cpuUsage = metrics.cpu.totalUsage.toFixed(1);
            document.getElementById('cpuUsage').textContent = cpuUsage + '%';
            document.getElementById('cpuProgress').style.width = cpuUsage + '%';
            document.getElementById('cpuCores').textContent = metrics.cpu.cores + ' 核心';
            
            // 内存卡片
            const memoryUsage = metrics.memory.usage.toFixed(1);
            document.getElementById('memoryUsage').textContent = memoryUsage + '%';
            document.getElementById('memoryProgress').style.width = memoryUsage + '%';
            document.getElementById('memoryTotal').textContent = metrics.memory.humanReadable.total;
            
            // 磁盘卡片（使用第一个分区）
            if (metrics.disk && metrics.disk.length > 0) {
                const disk = metrics.disk[0];
                const diskUsage = disk.usage.toFixed(1);
                document.getElementById('diskUsage').textContent = diskUsage + '%';
                document.getElementById('diskProgress').style.width = diskUsage + '%';
                document.getElementById('diskMount').textContent = disk.mount;
            }
            
            // 进程卡片
            if (metrics.processes) {
                document.getElementById('processCount').textContent = metrics.processes.total;
                const loadAvg = metrics.cpu.load['1min'].toFixed(2);
                document.getElementById('loadAvg').textContent = loadAvg;
                const loadPercentage = Math.min(100, (loadAvg / metrics.cpu.cores) * 100);
                document.getElementById('loadProgress').style.width = loadPercentage + '%';
            }
            
            // 计算趋势（如果有上次数据）
            if (lastMetrics) {
                updateTrendIndicators(metrics);
            }
            
            lastMetrics = metrics;
        }
        
        // 更新趋势指示器
        function updateTrendIndicators(metrics) {
            // CPU趋势
            const cpuDiff = metrics.cpu.totalUsage - lastMetrics.cpu.totalUsage;
            updateTrendElement('cpuTrend', cpuDiff);
            
            // 内存趋势
            const memDiff = metrics.memory.usage - lastMetrics.memory.usage;
            updateTrendElement('memoryTrend', memDiff);
            
            // 磁盘趋势
            if (metrics.disk && metrics.disk.length > 0 && lastMetrics.disk && lastMetrics.disk.length > 0) {
                const diskDiff = metrics.disk[0].usage - lastMetrics.disk[0].usage;
                updateTrendElement('diskTrend', diskDiff);
            }
        }
        
        // 更新趋势元素
        function updateTrendElement(elementId, diff) {
            const element = document.getElementById(elementId);
            if (Math.abs(diff) < 0.05) {
                element.textContent = '→ 稳定';
                element.className = 'card-trend';
            } else if (diff > 0) {
                element.textContent = '↑ +' + diff.toFixed(1) + '%';
                element.className = 'card-trend negative';
            } else {
                element.textContent = '↓ ' + diff.toFixed(1) + '%';
                element.className = 'card-trend positive';
            }
        }
        
        // 更新图表数据
        function updateCharts(historyData) {
            if (!historyData || !Array.isArray(historyData) || historyData.length === 0) return;
            
            // 准备时间序列数据
            const cpuData = [];
            const memoryData = [];
            const load1Data = [];
            const load5Data = [];
            const load15Data = [];
            
            historyData.forEach(item => {
                const timestamp = item.timestamp;
                cpuData.push([timestamp, item.cpu.totalUsage]);
                memoryData.push([timestamp, item.memory.usage]);
                load1Data.push([timestamp, item.cpu.load['1min']]);
                load5Data.push([timestamp, item.cpu.load['5min']]);
                load15Data.push([timestamp, item.cpu.load['15min']]);
            });
            
            // 更新CPU图表
            cpuChart.setOption({
                series: [{
                    data: cpuData
                }]
            });
            
            // 更新内存图表
            memoryChart.setOption({
                series: [{
                    data: memoryData
                }]
            });
            
            // 更新负载图表
            loadChart.setOption({
                series: [{
                    data: load1Data
                }, {
                    data: load5Data
                }, {
                    data: load15Data
                }]
            });
            
            // 更新磁盘图表（使用最新数据）
            if (historyData.length > 0) {
                const latestMetrics = historyData[historyData.length - 1];
                if (latestMetrics.disk && latestMetrics.disk.length > 0) {
                    const diskData = latestMetrics.disk.map(disk => ({
                        name: disk.mount,
                        value: disk.usage
                    }));
                    
                    diskChart.setOption({
                        series: [{
                            data: diskData
                        }]
                    });
                }
            }
        }
        
        // 更新进程表格
        function updateProcessTable(processTree) {
            const tbody = document.getElementById('processTableBody');
            if (!processTree || !processTree.processes || processTree.processes.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <i class="fas fa-info-circle"></i>
                            <p>暂无进程数据</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            processTree.processes.forEach(process => {
                const cpuClass = getResourceClass(process.resourceUsage?.cpu || 0);
                const memClass = getResourceClass(process.resourceUsage?.mem || 0);
                
                html += `
                    <tr>
                        <td class="process-pid">${process.pid}</td>
                        <td class="process-user">${process.user}</td>
                        <td title="${process.args}">${process.command}</td>
                        <td class="process-resource process-cpu ${cpuClass}">${(process.resourceUsage?.cpu || 0).toFixed(1)}%</td>
                        <td class="process-resource process-mem ${memClass}">${(process.resourceUsage?.mem || 0).toFixed(1)}%</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 更新端口表格
        function updatePortsTable(portInfo) {
            const tbody = document.getElementById('portsTableBody');
            if (!portInfo || !portInfo.ports || portInfo.ports.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-state">
                            <i class="fas fa-info-circle"></i>
                            <p>暂无端口数据</p>
                        </td>
                    </tr>
                `;
                return;
            }
            
            let html = '';
            portInfo.ports.forEach(port => {
                const stateClass = getPortStateClass(port.state);
                
                html += `
                    <tr>
                        <td class="port-number">${port.port}</td>
                        <td><span class="port-protocol">${port.protocol}</span></td>
                        <td><span class="port-state ${stateClass}">${port.state}</span></td>
                        <td>${port.program}</td>
                        <td class="port-description">${port.description || '--'}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // 获取资源使用等级
        function getResourceClass(value) {
            if (value >= 50) return 'high';
            if (value >= 20) return 'medium';
            return 'low';
        }
        
        // 获取端口状态等级
        function getPortStateClass(state) {
            if (state.includes('LISTEN')) return 'listening';
            if (state.includes('ESTAB')) return 'established';
            return 'other';
        }
        
        // 加载监控数据
        async function loadMetricsData() {
            try {
                // 显示加载状态
                setLoading(true);
                
                // 获取监控摘要
                const summaryResponse = await apiRequest('/metrics/summary');
                if (summaryResponse.success) {
                    updateOverviewCards(summaryResponse.data);
                }
                
                // 获取历史数据
                const historyResponse = await apiRequest('/metrics/history?limit=100');
                if (historyResponse.success) {
                    updateCharts(historyResponse.data);
                }
                
                // 获取进程树
                const processResponse = await apiRequest('/metrics/process-tree');
                if (processResponse.success) {
                    updateProcessTable(processResponse.data);
                }
                
                // 获取端口信息
                const portsResponse = await apiRequest('/metrics/ports');
                if (portsResponse.success) {
                    updatePortsTable(portsResponse.data);
                }
                
            } catch (error) {
                console.error('加载监控数据失败:', error);
                showError('加载监控数据失败: ' + (error.message || '未知错误'));
            } finally {
                setLoading(false);
            }
        }
        
        // 设置加载状态
        function setLoading(isLoading) {
            const refreshBtn = document.getElementById('refreshBtn');
            if (isLoading) {
                refreshBtn.classList.add('refreshing');
                refreshBtn.disabled = true;
            } else {
                refreshBtn.classList.remove('refreshing');
                refreshBtn.disabled = false;
            }
        }
        
        // 显示错误消息
        function showError(message) {
            // 可以在这里添加更优雅的错误显示
            console.error('Error:', message);
            alert(message);
        }
        
        // 切换时间范围
        function setupTimeRangeButtons() {
            const buttons = document.querySelectorAll('.time-range-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 更新活动状态
                    buttons.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 更新当前时间范围
                    currentTimeRange = this.dataset.range;
                    
                    // 重新加载数据
                    loadMetricsData();
                });
            });
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化图表
            initCharts();
            
            // 设置时间范围按钮
            setupTimeRangeButtons();
            
            // 设置刷新按钮
            document.getElementById('refreshBtn').addEventListener('click', loadMetricsData);
            
            // 初始加载数据
            loadMetricsData();
            
            // 设置自动刷新（每30秒）
            refreshInterval = setInterval(loadMetricsData, 30000);
        });
        
        // 清理资源
        window.addEventListener('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
