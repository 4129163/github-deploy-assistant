# Gitee CI/CD 配置文件
# 自动构建和推送Docker镜像到阿里云容器镜像服务

version: '1.0'
name: Docker Build and Push Pipeline

stages:
  - prepare
  - build
  - test
  - push
  - deploy

variables:
  # 镜像配置
  IMAGE_NAME: github-deploy-assistant
  DOCKER_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  NAMESPACE: kai0339
  
  # 构建配置
  NODE_VERSION: 18
  DOCKER_BUILDKIT: 1

before_script:
  - echo "🚀 开始GitHub Deploy Assistant Docker构建流程..."
  - echo "📅 构建时间: $(date)"
  - echo "🔗 提交信息: $CI_COMMIT_MESSAGE"
  - echo "🏷️  分支: $CI_COMMIT_REF_NAME"
  - echo "🆔 提交ID: $CI_COMMIT_SHA"

# 准备阶段：安装依赖和工具
prepare:
  stage: prepare
  script:
    - echo "📦 准备构建环境..."
    - apt-get update && apt-get install -y curl jq
    - docker version
    - echo "✅ 环境准备完成"
  only:
    - main
    - master
    - tags

# 构建阶段：构建Docker镜像
build:
  stage: build
  script:
    - echo "🔨 开始构建Docker镜像..."
    
    # 设置镜像标签
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        IMAGE_TAG="$CI_COMMIT_TAG"
        LATEST_TAG="latest"
        echo "📌 使用版本标签: $IMAGE_TAG"
      elif [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        IMAGE_TAG="latest"
        LATEST_TAG="latest"
        echo "📌 使用最新标签: $IMAGE_TAG"
      else
        IMAGE_TAG="$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA"
        LATEST_TAG=""
        echo "📌 使用分支标签: $IMAGE_TAG"
      fi
    
    # 构建镜像
    - echo "🏗️  构建镜像: $NAMESPACE/$IMAGE_NAME:$IMAGE_TAG"
    - docker build -t $NAMESPACE/$IMAGE_NAME:$IMAGE_TAG .
    
    # 如果是主分支或标签，也打上latest标签
    - |
      if [ -n "$LATEST_TAG" ]; then
        echo "🏷️  添加latest标签"
        docker tag $NAMESPACE/$IMAGE_NAME:$IMAGE_TAG $NAMESPACE/$IMAGE_NAME:latest
      fi
    
    - echo "✅ Docker镜像构建完成"
    
    # 保存镜像信息
    - docker images | grep $NAMESPACE/$IMAGE_NAME > image_info.txt
    - echo "📊 镜像大小: $(docker images $NAMESPACE/$IMAGE_NAME:$IMAGE_TAG --format "{{.Size}}")"
  artifacts:
    paths:
      - image_info.txt
    expire_in: 1 week
  only:
    - main
    - master
    - tags

# 测试阶段：运行容器测试
test:
  stage: test
  script:
    - echo "🧪 开始运行测试..."
    
    # 确定测试用的镜像标签
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        TEST_TAG="$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        TEST_TAG="latest"
      else
        TEST_TAG="$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA"
      fi
    
    # 运行单元测试
    - echo "🔬 运行单元测试..."
    - docker run --rm $NAMESPACE/$IMAGE_NAME:$TEST_TAG npm test || echo "⚠️  单元测试失败，但继续构建流程"
    
    # 运行容器健康检查
    - echo "❤️  运行容器健康检查..."
    - |
      CONTAINER_ID=$(docker run -d -p 3456:3456 --name gada-test $NAMESPACE/$IMAGE_NAME:$TEST_TAG)
      sleep 10
      
      # 检查容器是否运行
      if docker ps | grep -q gada-test; then
        echo "✅ 容器启动成功"
        
        # 检查健康接口
        HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3456/api/health || echo "000")
        if [ "$HEALTH_RESPONSE" = "200" ]; then
          echo "✅ 健康检查通过 (HTTP $HEALTH_RESPONSE)"
        else
          echo "❌ 健康检查失败 (HTTP $HEALTH_RESPONSE)"
          docker logs gada-test
          exit 1
        fi
        
        # 停止测试容器
        docker stop gada-test
        docker rm gada-test
      else
        echo "❌ 容器启动失败"
        docker logs gada-test
        exit 1
      fi
    
    - echo "✅ 所有测试通过"
  only:
    - main
    - master
    - tags

# 推送阶段：推送镜像到仓库
push:
  stage: push
  script:
    - echo "📤 开始推送Docker镜像..."
    
    # 登录到阿里云容器镜像服务
    - echo "🔐 登录到阿里云容器镜像服务..."
    - echo "$ALIYUN_DOCKER_PASSWORD" | docker login -u "$ALIYUN_DOCKER_USERNAME" --password-stdin $DOCKER_REGISTRY
    
    # 确定推送的标签
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        PUSH_TAGS=("$CI_COMMIT_TAG" "latest")
        echo "📌 推送版本标签: ${PUSH_TAGS[*]}"
      elif [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        PUSH_TAGS=("latest")
        echo "📌 推送最新标签: ${PUSH_TAGS[*]}"
      else
        PUSH_TAGS=("$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA")
        echo "📌 推送分支标签: ${PUSH_TAGS[*]}"
      fi
    
    # 推送所有标签
    - |
      for TAG in "${PUSH_TAGS[@]}"; do
        echo "🚀 推送镜像: $NAMESPACE/$IMAGE_NAME:$TAG"
        docker push $DOCKER_REGISTRY/$NAMESPACE/$IMAGE_NAME:$TAG
        
        if [ $? -eq 0 ]; then
          echo "✅ 镜像推送成功: $TAG"
          
          # 记录推送信息
          echo "📝 镜像地址: $DOCKER_REGISTRY/$NAMESPACE/$IMAGE_NAME:$TAG" >> push_info.txt
        else
          echo "❌ 镜像推送失败: $TAG"
          exit 1
        fi
      done
    
    - echo "✅ 所有镜像推送完成"
  artifacts:
    paths:
      - push_info.txt
    expire_in: 1 week
  only:
    - main
    - master
    - tags
  dependencies:
    - build
    - test

# 部署阶段：可选的自定义部署步骤
deploy:
  stage: deploy
  script:
    - echo "🚀 开始部署..."
    
    # 这里可以添加自定义部署脚本
    # 例如：更新Kubernetes部署、发送通知等
    
    - |
      if [[ "$CI_COMMIT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
        echo "🎉 发布新版本: $CI_COMMIT_TAG"
        echo "📢 镜像地址: $DOCKER_REGISTRY/$NAMESPACE/$IMAGE_NAME:$CI_COMMIT_TAG"
        echo "📢 Docker运行命令: docker run -p 3456:3456 -v ./workspace:/workspace $DOCKER_REGISTRY/$NAMESPACE/$IMAGE_NAME:$CI_COMMIT_TAG"
      fi
    
    - echo "✅ 部署流程完成"
  only:
    - tags
  dependencies:
    - push

# 清理阶段：清理临时资源
.after_script:
  - echo "🧹 清理临时资源..."
  - docker system prune -f --filter "until=24h" || true
  - echo "🎉 CI/CD流程完成！"

# 通知配置
notification:
  webhooks:
    - url: $CI_WEBHOOK_URL
      on_success: always
      on_failure: always
      on_pending: always
      on_abort: always