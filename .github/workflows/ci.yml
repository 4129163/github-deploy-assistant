name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 代码质量检查
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.js"

      - name: Security audit
        run: |
          npm audit --audit-level=high || echo "Security audit completed with warnings"
          npm audit --json > security-report.json
        continue-on-error: true

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.json

  # 单元测试（多版本）
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.node-version }}
          path: |
            coverage/
            test-report.xml

      - name: Test coverage summary
        run: |
          echo "Test coverage summary for Node.js ${{ matrix.node-version }}:"
          if [ -f "coverage/coverage-summary.json" ]; then
            cat coverage/coverage-summary.json | jq '.total'
          fi

  # 前端构建验证
  build-verification:
    runs-on: ubuntu-latest
    needs: [quality-check, unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build process
        run: npm run build

      - name: Check public directory
        run: |
          echo "Checking public directory structure..."
          ls -la public/ || echo "No public directory found"

      - name: Verify package.json scripts
        run: |
          echo "Available npm scripts:"
          npm run

  # 跨平台编译检查
  cross-platform-check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify platform-specific scripts
        run: |
          echo "Platform: ${{ runner.os }}"
          echo "Checking installation scripts..."
          if [ -f "install.sh" ]; then
            echo "install.sh exists"
            head -20 install.sh
          fi
          if [ -f "install.ps1" ]; then
            echo "install.ps1 exists"
            head -20 install.ps1
          fi
          if [ -f "启动.bat" ]; then
            echo "启动.bat exists"
            head -20 启动.bat
          fi

      - name: Run basic functionality test
        run: |
          echo "Testing basic functionality on ${{ runner.os }}"
          node -e "console.log('Node.js version:', process.version)"
          node -e "console.log('Platform:', process.platform, process.arch)"

  # 汇总报告
  summary:
    runs-on: ubuntu-latest
    needs: [quality-check, unit-tests, build-verification, cross-platform-check]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate CI summary
        run: |
          echo "=== CI Pipeline Summary ==="
          echo "Timestamp: $(date)"
          echo "Run URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Job Status:"
          echo "- Quality Check: ${{ needs.quality-check.result }}"
          echo "- Unit Tests: ${{ needs.unit-tests.result }}"
          echo "- Build Verification: ${{ needs.build-verification.result }}"
          echo "- Cross-platform Check: ${{ needs.cross-platform-check.result }}"
          echo ""
          echo "Pipeline Status: ${{ job.status }}"